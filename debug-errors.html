<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代码错误检查工具</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1 {
      color: #2d3748;
      text-align: center;
      margin-bottom: 30px;
    }
    .section {
      background: #f7fafc;
      padding: 20px;
      margin: 15px 0;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }
    .section h3 {
      margin-top: 0;
      color: #2d3748;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }
    .status {
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-weight: 500;
    }
    .success {
      background: #c6f6d5;
      color: #22543d;
      border: 1px solid #48bb78;
    }
    .error {
      background: #fed7d7;
      color: #742a2a;
      border: 1px solid #f56565;
    }
    .warning {
      background: #feebc8;
      color: #7c2d12;
      border: 1px solid #ed8936;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover {
      background: #5568d3;
    }
    .log {
      background: #1a202c;
      color: #e2e8f0;
      padding: 15px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 代码错误检查工具</h1>

    <div class="section">
      <h3>🚀 快速检查</h3>
      <button onclick="runFullCheck()">🔍 运行完整检查</button>
      <button onclick="checkSyntax()">📝 检查语法</button>
      <button onclick="checkUndefined()">❓ 检查未定义变量</button>
      <button onclick="clearLogs()">🗑️ 清空日志</button>
    </div>

    <div class="section">
      <h3>📊 检查状态</h3>
      <div id="check-status">
        <div class="status info">点击"运行完整检查"开始</div>
      </div>
    </div>

    <div class="section">
      <h3>📋 检查日志</h3>
      <div id="log-output" class="log">等待检查...</div>
    </div>
  </div>

  <script>
    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const prefix = {
        'success': '✅',
        'error': '❌',
        'warning': '⚠️',
        'info': 'ℹ️'
      }[type] || 'ℹ️';

      const logDiv = document.getElementById('log-output');
      const messageStr = `[${timestamp}] ${prefix} ${message}`;
      logDiv.innerHTML += messageStr + '\n';
      logDiv.scrollTop = logDiv.scrollHeight;
      console.log(messageStr);
    }

    function clearLogs() {
      document.getElementById('log-output').innerHTML = '日志已清空\n';
    }

    function updateStatus(message, type = 'info') {
      const statusDiv = document.getElementById('check-status');
      const html = `<div class="status ${type}">${message}</div>`;
      statusDiv.innerHTML = html;
    }

    async function checkSyntax() {
      clearLogs();
      log('开始检查语法...', 'info');

      try {
        // 尝试加载主页面检查语法错误
        const response = await fetch('index.html');
        const html = await response.text();

        // 检查基本的语法平衡
        const openBraces = (html.match(/{/g) || []).length;
        const closeBraces = (html.match(/}/g) || []).length;
        const openParens = (html.match(/\(/g) || []).length;
        const closeParens = (html.match(/\)/g) || []).length;

        log(`✓ 括号平衡检查: ${openParens === closeParens ? '通过' : '警告'}`, openParens === closeParens ? 'success' : 'warning');
        log(`  开括号: ${openParens}, 闭括号: ${closeParens}`);

        log(`✓ 花括号平衡检查: ${openBraces === closeBraces ? '通过' : '警告'}`, openBraces === closeBraces ? 'success' : 'warning');
        log(`  开花括号: ${openBraces}, 闭花括号: ${closeBraces}`);

        // 检查常见的语法错误模式
        const syntaxErrors = [];

        // 检查是否有未闭合的字符串
        const strings = html.match(/"[^"]*"|'[^']*'/g) || [];
        log(`✓ 字符串检查: 发现 ${strings.length} 个字符串`, 'info');

        // 检查是否有连续的分号
        if (html.match(/-->/)) {
          log('⚠️ 发现在HTML注释外的连续分号', 'warning');
        }

        if (syntaxErrors.length === 0) {
          log('✅ 未发现明显的语法错误', 'success');
          updateStatus('✅ 语法检查通过', 'success');
        } else {
          syntaxErrors.forEach(err => log(`❌ ${err}`, 'error'));
          updateStatus('❌ 发现语法错误', 'error');
        }

      } catch (e) {
        log(`❌ 语法检查失败: ${e.message}`, 'error');
        updateStatus('❌ 检查失败', 'error');
      }
    }

    async function checkUndefined() {
      log('检查未定义变量引用...', 'info');

      // 检查常见的未定义变量
      const undefinedChecks = [
        'window.mySupabase',
        'SUPABASE_ENABLED',
        'BASE64_MAX_SIZE',
        'LARGE_FILE_SIZE',
        'isRemoteUpdate',
        'weatherCities',
        'weatherData',
        'activeWeatherCity'
      ];

      let allDefined = true;
      for (const check of undefinedChecks) {
        try {
          // 评估变量是否定义
          if (check.includes('window.')) {
            if (eval(`typeof ${check} === 'undefined'`)) {
              log(`❌ 未定义: ${check}`, 'error');
              allDefined = false;
            } else {
              log(`✓ 已定义: ${check}`, 'success');
            }
          }
        } catch (e) {
          log(`⚠️ 检查失败: ${check}`, 'warning');
        }
      }

      if (allDefined) {
        updateStatus('✅ 变量检查通过', 'success');
      } else {
        updateStatus('❌ 发现未定义变量', 'error');
      }
    }

    async function runFullCheck() {
      clearLogs();
      log('🚀 开始完整代码检查...', 'info');

      try {
        // 1. 语法检查
        log('步骤 1/4: 语法检查...', 'info');
        await checkSyntax();

        // 2. 变量检查
        log('步骤 2/4: 变量检查...', 'info');
        await checkUndefined();

        // 3. 功能测试
        log('步骤 3/4: 功能检查...', 'info');

        // 检查Supabase连接
        if (typeof window.mySupabase !== 'undefined') {
          log('✅ Supabase客户端已初始化', 'success');
        } else {
          log('⚠️ Supabase客户端未初始化', 'warning');
        }

        // 检查IndexedDB
        if (typeof indexedDB !== 'undefined') {
          log('✅ IndexedDB 可用', 'success');
        } else {
          log('❌ IndexedDB 不可用', 'error');
        }

        // 4. 生成报告
        log('步骤 4/4: 生成报告...', 'info');

        log('\n=== 检查报告 ===', 'info');
        log('✅ 代码结构: 基本正常', 'success');
        log('⚠️ 需要配置: Supabase天气表', 'warning');

        updateStatus('✅ 检查完成', 'success');

      } catch (e) {
        log(`❌ 检查失败: ${e.message}`, 'error');
        updateStatus('❌ 检查失败', 'error');
      }
    }

    // 页面加载时自动运行基础检查
    window.addEventListener('load', () => {
      log('代码检查工具已加载', 'info');
      log('点击"运行完整检查"开始检查', 'info');
    });
  </script>
</body>
</html>
